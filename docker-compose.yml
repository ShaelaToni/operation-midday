services:
  db:
    image: postgres:15
    container_name: noon_local_db
    env_file:
      - db.env
    ports:
      - "5433:5432"
    volumes:
      - noon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  noon_pgdata:
